name: Deploy BudgetBot to AWS

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép bấm nút chạy tay trên GitHub

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  FRONTEND_S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  LAMBDA_CHAT_NAME: budget-bot-chat
  LAMBDA_UPLOAD_NAME: budget-bot-upload

jobs:
  # ============================================================
  # Job 1: Deploy Backend (Python FastAPI → Lambda)
  # ============================================================
  deploy-backend:
    name: Deploy API to Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Đóng gói code + dependencies vào 1 file zip để đẩy lên Lambda
      - name: Package Lambda Code
        run: |
          cd apps/api
          
          # Cài dependencies vào thư mục tạm
          pip install -r requirements.txt -t ./package --quiet
          
          # Thêm mangum (adapter chuyển FastAPI → Lambda handler)
          pip install mangum -t ./package --quiet
          
          # Copy toàn bộ source code vào package
          cp -r src ./package/src
          
          # Tạo file entry point cho Lambda (index.py với hàm handler)
          cat > ./package/index.py << 'EOF'
          """Lambda entry point — wraps FastAPI app with Mangum and Bedrock Agent Handler."""
          import os
          # Cấu hình cho môi trường AWS Lambda
          os.environ.setdefault("AI_BACKEND", "bedrock")
          os.environ.setdefault("STORAGE_BACKEND", "s3")
          os.environ.setdefault("SERVE_FRONTEND", "false")

          from mangum import Mangum
          from src.app import app
          from src.adapters.bedrock_agent_handler import handle_bedrock_agent_event

          mangum_handler = Mangum(app, lifespan="off")

          def handler(event, context):
              # Check if the event is from Bedrock Agent Action Group
              if isinstance(event, dict) and "actionGroup" in event:
                  return handle_bedrock_agent_event(event, context)
              return mangum_handler(event, context)
          EOF
          
          # Nén thành file zip
          cd package
          zip -r9 ../lambda_package.zip . --quiet
          cd ..
          echo "Package size: $(du -sh lambda_package.zip | cut -f1)"

      # Deploy cùng 1 code cho cả 2 con Lambda (API Gateway sẽ route đúng endpoint)
      - name: Deploy to Lambda (chat)
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_CHAT_NAME }} \
            --zip-file fileb://apps/api/lambda_package.zip \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda ${{ env.LAMBDA_CHAT_NAME }} đã được cập nhật."

      - name: Deploy to Lambda (upload)
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_UPLOAD_NAME }} \
            --zip-file fileb://apps/api/lambda_package.zip \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda ${{ env.LAMBDA_UPLOAD_NAME }} đã được cập nhật."

      # Chờ Lambda sẵn sàng rồi mới kết thúc
      - name: Wait for Lambda Ready
        run: |
          echo "Đang chờ Lambda cập nhật xong..."
          aws lambda wait function-updated --function-name ${{ env.LAMBDA_CHAT_NAME }} --region ${{ env.AWS_REGION }}
          aws lambda wait function-updated --function-name ${{ env.LAMBDA_UPLOAD_NAME }} --region ${{ env.AWS_REGION }}
          echo "✅ Cả 2 Lambda đều đã sẵn sàng nhận request."

  # ============================================================
  # Job 2: Deploy Frontend (Next.js static → S3 + CloudFront)
  # ============================================================
  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Frontend (Static Export)
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_COGNITO_DOMAIN: ${{ vars.NEXT_PUBLIC_COGNITO_DOMAIN || 'budget-bot-g9.auth.us-west-2.amazoncognito.com' }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID || '7j68tq2fcko91n11afeqhv9t6o' }}
          NEXT_PUBLIC_COGNITO_REDIRECT_URI: ${{ vars.NEXT_PUBLIC_COGNITO_REDIRECT_URI || 'https://app.group9.id.vn' }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Đẩy file tĩnh lên S3 với chiến lược cache thông minh
      - name: Sync to S3
        run: |
          # File không phải HTML → cache lâu (1 năm) vì có hash trong tên file
          aws s3 sync apps/web/out/ s3://${{ env.FRONTEND_S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          
          # File HTML → không cache (luôn lấy bản mới nhất)
          aws s3 sync apps/web/out/ s3://${{ env.FRONTEND_S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html"
          
          echo "✅ Frontend đã được đẩy lên S3."

      # Xóa cache CloudFront để user thấy bản mới ngay lập tức
      - name: Invalidate CloudFront Cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache đã được xóa."
